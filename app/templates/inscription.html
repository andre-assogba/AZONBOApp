{% extends 'base.html' %}
{% block contenu %}
<h2>📋 Inscription</h2>
{% if erreur %}
<div class='card' style='border-left:4px solid #c0392b;background:#fdecea;'><p style='color:#c0392b;margin:0;font-weight:bold;'>⚠️ {{ erreur }}</p></div>
{% endif %}
<form method='POST' onsubmit='return verifier()'>
<p>👤 <input type='text' name='nom' id='nom' placeholder='Votre nom complet' required style='font-size:1.1em;padding:10px;width:80%;'></p>
<p>🔒 <input type='password' name='mot_de_passe' id='mdp' placeholder='Choisissez un mot de passe' required style='font-size:1.1em;padding:10px;width:80%;'></p>
<p>🔒 <input type='password' id='mdp2' placeholder='Confirmez le mot de passe' required style='font-size:1.1em;padding:10px;width:80%;'></p>
<p id='erreur_mdp' style='color:red;display:none;'>❌ Les mots de passe ne correspondent pas.</p>
<button type='submit' class='btn' style='font-size:1.1em;padding:12px 30px;'>✅ S inscrire</button>
</form>
<script>
function verifier(){
  var m1=document.getElementById('mdp').value;
  var m2=document.getElementById('mdp2').value;
  if(m1!==m2){
    document.getElementById('erreur_mdp').style.display='block';
    return false;
  }
  return true;
}
</script>
{% endblock %}
