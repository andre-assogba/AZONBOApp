{% extends 'base.html' %}
{% block contenu %}
<h2>🔐 Inscription</h2>
{% if erreur %}
<div class='card' style='border-left:4px solid #c0392b;background:#fdecea;'><p style='color:#c0392b;margin:0;font-weight:bold;'>⚠️ {{ erreur }}</p></div>
{% endif %}
<form method='POST'>
<input type='text' name='nom' placeholder='Nom utilisateur' required><br>
<input type='password' name='mot_de_passe' placeholder='Mot de passe' required><br>
<button type='submit' class='btn'>S inscrire</button>
</form>
{% endblock %}
