{% extends "base.html" %}
{% block contenu %}
<h2>🛒 Nouvelle vente</h2>
{% if erreur %}<div class="card alerte">{{ erreur }}</div>{% endif %}
<form method="post">
    <div class="card">
        <label>Nom du client</label><br>
        <input name="client" placeholder="Nom du client" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;font-size:16px;"><br><br><label>Téléphone (facultatif)</label><br><input name="telephone" placeholder="Ex: 97000000" type="tel" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;font-size:16px;">
    </div>
    <h3>Produits</h3>
    {% for p in produits %}
    <div class="card">
        <strong>{{ p[1] }}</strong> — {{ p[2]|int }} FCFA | Stock: {{ p[3] }}<br>
        <input type="hidden" name="produit_id" value="{{ p[0] }}"><input name="quantite" type="number" min="0" value="0"
        data-prix="{{ p[2] }}"
        onchange="calculerTotal()"
        style="width:100%;padding:8px;border-radius:8px;border:1px solid #ccc;font-size:16px;margin-top:5px;">
    </div>
    {% endfor %}
    <div class="card" style="text-align:center;">
        <strong>TOTAL : <span id="total">0</span> FCFA</strong>
    </div>
<button type="submit" class="btn">Continuer →</button>

</form>
<a href="/ventes" class="btn" style="background:#888;">🔙 Retour</a>
<script>
function calculerTotal(){
    var total = 0;
    document.querySelectorAll('input[data-prix]').forEach(function(i){
        var qte = parseInt(i.value) || 0;
        var prix = parseFloat(i.getAttribute('data-prix')) || 0;
        total += qte * prix;
    });
    document.getElementById('total').textContent = Math.round(total);
}

</script>
{% endblock %}
